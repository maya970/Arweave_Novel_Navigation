<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永恒小说 | Arweave 永久书库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle at center, #1a0f2e 0%, #0a0514 100%);
            color: #e0d4ff;
            font-family: system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            text-align: center;
            z-index: 10;
        }
        
        .book {
            font-size: 6rem;
            animation: bookOpen 4s ease-in-out infinite;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 40px #c4b5fd);
        }
        
        @keyframes bookOpen {
            0%, 100% { transform: rotateY(0deg); }
            50% { transform: rotateY(25deg); }
        }
        
        .progress-container {
            width: 320px;
            height: 5px;
            background: rgba(167, 139, 250, 0.15);
            border-radius: 9999px;
            overflow: hidden;
            margin: 40px auto;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(to right, #c4b5fd, #f0d4ff, #e0b5fd);
            width: 0%;
            transition: width 4.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 25px #c4b5fd;
        }
        
        .title {
            font-size: 3.2rem;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }
        
        .subtitle {
            font-size: 1.4rem;
            opacity: 0.85;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="book">📖</div>
        
        <h1 class="title">永恒小说</h1>
        <p class="subtitle">把故事刻进 Arweave 的永恒书页</p>
        
        <div class="text-xl tracking-widest text-violet-200 mb-6">正在翻开下一章...</div>
        
        <!-- 炫酷进度条 -->
        <div class="progress-container">
            <div id="progress" class="progress-bar"></div>
        </div>
        
        <p class="text-xs text-violet-400/70 mt-12">即将跳转至小说永恒书库</p>
    </div>

    <script>
        // 新小说网站 Arweave 地址
        const targetUrl = "https://arweave.net/8j-luMpK0JNqeZhh6wnglSql2oapoGwrqWpYab52NT0/";

        window.onload = function() {
            const progressBar = document.getElementById('progress');
            
            // 启动柔和进度条动画
            setTimeout(() => {
                progressBar.style.width = '100%';
            }, 80);

            // 4.8秒后自动跳转（手感最舒服的时间）
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 4800);
        };
    </script>
</body>
</html>
